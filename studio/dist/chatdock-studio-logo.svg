<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 112" role="img" aria-labelledby="title desc">
  <title id="title">ChatDock Studio logo</title>
  <desc id="desc">ChatDock Studio wordmark with a docked chat bubble symbol.</desc>
  <defs>
